name: Main Kittygram Workflow

on:
  push:
    branches:
      - main

jobs:
  backend_tests:
    name: Backend tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ "3.9", "3.10", "3.11" ]
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python3 -m pip install --upgrade pip
        cd backend && pip install -r requirements.txt --no-cache-dir
    
    - name: Run PEP8 check
      run: |
        cd backend/
        python -m flake8
  
  frontend_tests:
    name: Frontend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up nodeJS
        uses: actions/setup-node@v3
        with:
          node-version: 18
      
      - name: Install dependencies
        run: |
          cd frontend/
          npm ci
      
      - name: Test frontend
        run: |
          cd frontend/
          npm run test
  
  push_to_registry:
    name: Build and push docker images to registry
    runs-on: ubuntu-latest
    needs: 
     - backend_tests
     - frontend_tests
    steps:
      - name: Check out the repo
        uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Login DockerHub 
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }} 
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build and push backend Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./backend/
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/kittygram_backend:latest

      - name: Build and push frontend image to DockerHub
        uses: docker/build-push-action@v4
        with:
          context: ./frontend/
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/kittygram_frontend:latest 
      
      - name: Build and push gateway image to DockerHub
        uses: docker/build-push-action@v4
        with:
          context: ./nginx/
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/kittygram_gateway:latest
  
  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: push_to_registry
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
      
      - name: Copy docker-compose.yml via SSH
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "docker-compose.production.yml"
          target: "kittygram"
      
      - name: Executing remote ssh commands to deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd kittygram

            sudo docker compose -f docker-compose.production.yml pull

            sudo docker compose -f docker-compose.production.yml down
            sudo docker compose -f docker-compose.production.yml up -d
            # Миграция и сбор статики перемещены в отдельный скрипт, см. backend/Dockerfile

  server_tests:
    name: Test deployed app
    runs-on: ubuntu-latest
    needs: deploy
    strategy:
      matrix:
        python-version: [ "3.9", "3.10", "3.11" ]
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip 
          pip install -r ./backend/requirements.txt 

      - name: Run tests
        run: python -m pytest

  notify:
    name: Notify in Telegram
    runs-on: ubuntu-latest
    needs: 
      - deploy
      - server_tests
    steps:
      - name: Send success message
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ✅ Приложение Kittygram успешно развернуто, все тесты пройдены!

            Информация о коммите:
            Автор: ${{ github.actor }}
            Сообщение: ${{ github.event.commits[0].message }}
            Репозиторий: ${{ github.repository }}
            Ветка: ${{ github.ref_name }}
            
            Детали: https://github.com/${{ github.repository }}/commit/${{github.sha}}

      - name: Send success message
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ❌ Не удалось развернуть и протестировать Kittygram!

            Информация о коммите:
            Автор: ${{ github.actor }}
            Сообщение: ${{ github.event.commits[0].message }}
            Репозиторий: ${{ github.repository }}
            Ветка: ${{ github.ref_name }}
            
            Детали: https://github.com/${{ github.repository }}/commit/${{github.sha}}
