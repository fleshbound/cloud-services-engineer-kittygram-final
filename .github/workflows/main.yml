name: Main Kittygram Workflow

on:
  workflow_run:
    workflows: ["Terraform Infrastructure"]
    types:
      - completed

jobs:
  gate:
    name: Only after successful terraform apply
    runs-on: ubuntu-latest
    outputs:
      run_ci: ${{ steps.verify.outputs.run_ci }}
    steps:
      - name: Check workflow was apply (not plan/destroy)
        id: verify
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ "${{ github.event.workflow_run.conclusion }}" != "success" ]; then
            echo "run_ci=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          RUN_ID="${{ github.event.workflow_run.id }}"
          APPLY=$(gh api "repos/${{ github.repository }}/actions/runs/${RUN_ID}/jobs" \
            --jq '.jobs[] | select(.name=="terraform") | .steps[] | select(.name=="Terraform Apply") | .conclusion' | head -n1)
          if [ "$APPLY" = "success" ]; then
            echo "run_ci=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_ci=false" >> "$GITHUB_OUTPUT"
          fi

  backend_tests:
    name: Backend tests
    runs-on: ubuntu-latest
    needs: gate
    if: needs.gate.outputs.run_ci == 'true'
    strategy:
      matrix:
        python-version: [ "3.9", "3.10", "3.11" ]
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python3 -m pip install --upgrade pip
        cd backend && pip install -r requirements.txt --no-cache-dir
    
    - name: Run PEP8 check
      run: |
        cd backend/
        python -m flake8
  
  frontend_tests:
    name: Frontend tests
    runs-on: ubuntu-latest
    needs: gate
    if: needs.gate.outputs.run_ci == 'true'
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up nodeJS
        uses: actions/setup-node@v3
        with:
          node-version: 18
      
      - name: Install dependencies
        run: |
          cd frontend/
          npm ci
      
      - name: Test frontend
        run: |
          cd frontend/
          npm run test

  push_to_registry:
    name: Build and push docker images to registry
    runs-on: ubuntu-latest
    needs: 
     - backend_tests
     - frontend_tests
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Check out the repo
        uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Login DockerHub 
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }} 
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build and push backend Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./backend/
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/kittygram_backend:latest

      - name: Build and push frontend image to DockerHub
        uses: docker/build-push-action@v4
        with:
          context: ./frontend/
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/kittygram_frontend:latest 
      
      - name: Build and push gateway image to DockerHub
        uses: docker/build-push-action@v4
        with:
          context: ./nginx/
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/kittygram_gateway:latest

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: 
      - push_to_registry
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: vm-ip
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Read VM IP
        id: read-ip
        run: echo "VM_IP=$(cat vm_ip.txt | xargs)" >> $GITHUB_OUTPUT

      - name: Checkout repo
        uses: actions/checkout@v4
      
      - name: Copy docker-compose.yml via SSH
        uses: appleboy/scp-action@master
        with:
          host: ${{ steps.read-ip.outputs.VM_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "docker-compose.production.yml"
          target: "kittygram"
          timeout: "60s"
      
      - name: Create .env file on server and start services
        uses: appleboy/ssh-action@master
        with:
          host: ${{ steps.read-ip.outputs.VM_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd kittygram
            echo "${{ secrets.ENV_FILE }}" > .env
            sudo docker compose -f docker-compose.production.yml pull
            sudo docker compose -f docker-compose.production.yml down
            sudo docker compose -f docker-compose.production.yml up -d
            sudo docker system prune -af

  server_tests:
    name: Test deployed app
    runs-on: ubuntu-latest
    needs: 
      - deploy
      - push_to_registry
    strategy:
      matrix:
        python-version: [ "3.9", "3.10", "3.11" ]
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: vm-ip
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Read VM IP
        id: read-ip
        run: echo "VM_IP=$(cat vm_ip.txt | xargs)" >> $GITHUB_OUTPUT

      - name: Checkout repo
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip 
          pip install -r ./backend/requirements.txt 
      
      - name: Update tests.yml with VM IP
        run: |
          sed -i 's/host:.*/host: ${{ steps.read-ip.outputs.VM_IP }}/' tests.yml || true
      
      - name: Run tests
        run: python -m pytest
        env:
          TEST_HOST: ${{ steps.read-ip.outputs.VM_IP }}

  notify:
    name: Notify in Telegram
    runs-on: ubuntu-latest
    needs: 
      - deploy
      - server_tests
    steps:
      - name: Send success message
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ✅ Приложение Kittygram успешно развернуто, все тесты пройдены!

            Информация о коммите:
            Автор: ${{ github.actor }}
            Сообщение: ${{ github.event.commits[0].message }}
            Репозиторий: ${{ github.repository }}
            Ветка: ${{ github.ref_name }}
            Хост: ${{ steps.read-ip.outputs.VM_IP }}
            
            Детали: https://github.com/${{ github.repository }}/commit/${{github.sha}}

      - name: Send success message
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ❌ Не удалось развернуть и протестировать Kittygram!

            Информация о коммите:
            Автор: ${{ github.actor }}
            Сообщение: ${{ github.event.commits[0].message }}
            Репозиторий: ${{ github.repository }}
            Ветка: ${{ github.ref_name }}
            Хост: ${{ steps.read-ip.outputs.VM_IP }}
            
            Детали: https://github.com/${{ github.repository }}/commit/${{github.sha}}
