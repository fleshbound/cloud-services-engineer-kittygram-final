name: Terraform Infrastructure

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action (plan/apply/destroy)'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
          - destroy

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.8.3

    - name: Set up Yandex Cloud service account key
      working-directory: ./infra
      run: |
        echo "${{ secrets.YC_KEY_JSON }}" | base64 -d > ./authorized_key.json

    - name: Initialize Terraform
      working-directory: ./infra
      run: terraform init -backend-config="access_key=${{ secrets.ACCESS_KEY }}" -backend-config="secret_key=${{ secrets.SECRET_KEY }}"

    - name: Terraform Plan
      working-directory: ./infra
      if: github.event.inputs.action == 'plan'
      run: terraform plan
      env:
        TF_VAR_cloud_id: ${{ secrets.YC_CLOUD_ID }}
        TF_VAR_folder_id: ${{ secrets.YC_FOLDER_ID }}
        TF_VAR_ssh_key: ${{ secrets.SSH_PUBLIC_KEY }}
        TF_VAR_aws_region: "ru-central1"

    - name: Terraform Apply
      working-directory: ./infra
      if: github.event.inputs.action == 'apply'
      run: terraform apply -auto-approve
      env:
        TF_VAR_cloud_id: ${{ secrets.YC_CLOUD_ID }}
        TF_VAR_folder_id: ${{ secrets.YC_FOLDER_ID }}
        TF_VAR_ssh_key: ${{ secrets.SSH_PUBLIC_KEY }}
        TF_VAR_aws_region: "ru-central1"

    - name: Terraform Destroy
      working-directory: ./infra
      if: github.event.inputs.action == 'destroy'
      run: terraform destroy -auto-approve
      env:
        TF_VAR_cloud_id: ${{ secrets.YC_CLOUD_ID }}
        TF_VAR_folder_id: ${{ secrets.YC_FOLDER_ID }}
        TF_VAR_ssh_key: ${{ secrets.SSH_PUBLIC_KEY }}
        TF_VAR_aws_region: "ru-central1"
