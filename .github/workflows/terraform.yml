name: Terraform Infrastructure

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action (plan/apply/destroy)'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
          - destroy

env:
  TF_VAR_cloud_id: ${{ secrets.CLOUD_ID }}
  TF_VAR_folder_id: ${{ secrets.FOLDER_ID }}
  TF_VAR_ssh_key: ${{ secrets.SSH_PUBLIC_KEY }}
  TF_VAR_aws_region: ${{ secrets.AWS_REGION || 'ru-central1' }}
  ACCESS_KEY: ${{ secrets.ACCESS_KEY }}
  SECRET_KEY: ${{ secrets.SECRET_KEY }}

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2
      with:
        terraform_version: 1.8.3

    - name: Set up Yandex Cloud service account key
      working-directory: ./infra
      env:
        YC_KEY_B64: ${{ secrets.YC_KEY_JSON }}
      run: |
        printf '%s' "$YC_KEY_B64" | base64 -d > ./authorized_key.json

    - name: Initialize Terraform
      working-directory: ./infra
      run: terraform init -backend-config="access_key=$ACCESS_KEY" -backend-config="secret_key=$SECRET_KEY"

    - name: Terraform Plan
      if: github.event.inputs.action == 'plan'
      working-directory: ./infra
      run: terraform plan

    - name: Terraform Apply
      if: github.event.inputs.action == 'apply'
      working-directory: ./infra
      run: terraform apply -auto-approve

    - name: Get VM IP from Terraform output
      if: github.event.inputs.action == 'apply' && success()
      working-directory: ./infra
      run: |
        VM_IP=$(terraform output -raw vm_ip | grep -oE '[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+' | head -1)
        echo "$VM_IP" > vm_ip.txt

    - name: Upload artifact
      if: github.event.inputs.action == 'apply' && success()
      uses: actions/upload-artifact@v4
      with:
        name: vm-ip
        path: infra/vm_ip.txt

    - name: Terraform Destroy
      if: github.event.inputs.action == 'destroy'
      working-directory: ./infra
      run: terraform destroy -auto-approve   